<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>Bianore Attendance Offline</title>
    <style>
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        align-items: center;
        background: #f8fafc;
        color: #0f172a;
        display: flex;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        justify-content: center;
        padding: 24px;
      }
      main {
        max-width: 360px;
        text-align: center;
      }
      img {
        height: 72px;
        margin: 0 auto 24px;
        width: 72px;
      }
      h1 {
        font-size: 22px;
        line-height: 1.2;
        margin: 0 0 10px;
      }
      p {
        color: #475569;
        font-size: 15px;
        line-height: 1.6;
        margin: 0 0 22px;
      }
      button {
        background: #2563eb;
        border: 0;
        border-radius: 8px;
        color: white;
        cursor: pointer;
        font-size: 15px;
        font-weight: 700;
        padding: 12px 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon.svg" alt="" />
      <h1>You're offline</h1>
      <p>Bianore Attendance needs a connection for live attendance data. Reconnect and try again.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
